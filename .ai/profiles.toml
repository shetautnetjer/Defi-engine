[meta]
version = "v1"
owner = "D5 Trading Engine"
purpose = "Training and autoresearch profiles only; not runtime strategy or risk authority."
default_authority = "proposal_only"
default_status = "active"

[defaults]
authority = "proposal_only"
status = "active"
exploration = "balanced"
cost_sensitivity = "balanced_cost"
max_concurrent_experiments = 1
max_daily_proposals = 3
requires_qmd_receipt = true
requires_sql_metrics = true

[profiles.momentum_scalper_perps]
market_style = "momentum"
time_horizon = "scalp"
market_focus = ["perps", "majors", "solana"]
cost_sensitivity = "ultra_cost_sensitive"
exploration = "balanced"
authority = "proposal_only"
preferred_sources = ["jupiter", "massive"]
preferred_surfaces = ["condition_model", "execution_fill", "label_program"]
preferred_features = [
  "returns_short",
  "realized_vol",
  "quote_imbalance",
  "liquidity_pressure",
  "trend_context"
]
preferred_labels = ["tb_60m_atr1x_v1"]
preferred_metrics = [
  "net_expectancy",
  "fill_quality",
  "max_drawdown",
  "turnover_cost",
  "slippage_realism"
]
disfavored_conditions = ["chop", "anomalous", "illiquid_fragile"]
primary_objective = "Capture short momentum bursts only when execution quality remains realistic after cost."
hypothesis_templates = [
  "Short-horizon momentum works best when spread and price impact stay below threshold.",
  "Momentum setups degrade quickly in chop and anomaly-heavy tape."
]
max_concurrent_experiments = 1
max_daily_proposals = 2

