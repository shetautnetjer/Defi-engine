version: 1
condition_set: global_regime_v1
status: advisory_only
description: >
  First bounded semantic-regime to advisory-bias mapping. This file is not yet a
  runtime policy owner; it exists so later policy traces consume explicit YAML
  instead of hard-coded semantic assumptions.
regimes:
  long_friendly:
    advisory_bias: long_friendly
    allow_new_long_hypotheses: true
    allow_new_short_hypotheses: false
    notes: Prefer long-side research and paper hypotheses only after policy/risk gates exist.
  short_friendly:
    advisory_bias: short_friendly
    allow_new_long_hypotheses: false
    allow_new_short_hypotheses: true
    notes: Prefer short-side research and paper hypotheses only after policy/risk gates exist.
  risk_off:
    advisory_bias: risk_off
    allow_new_long_hypotheses: false
    allow_new_short_hypotheses: false
    notes: Treat as defensive and fail-closed until a real policy trace and risk gate are present.
  no_trade:
    advisory_bias: no_trade
    allow_new_long_hypotheses: false
    allow_new_short_hypotheses: false
    notes: Use when the semantic regime is unclear or structurally low quality.
