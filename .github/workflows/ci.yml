name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile sources
        run: python -m compileall src/d5_trading_engine

      - name: Smoke CLI import
        run: PYTHONPATH=src python -m d5_trading_engine.cli --help

      - name: Run default tests
        run: pytest tests -q

      - name: Ruff
        run: |
          ruff check \
            tests \
            src/d5_trading_engine/cli.py \
            src/d5_trading_engine/config/settings.py \
            src/d5_trading_engine/capture/runner.py \
            sql/migrations/env.py
